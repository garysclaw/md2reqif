name: CI
on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev
      # Playwright UI tests require a display server; run them locally with --headed.
      # See SKILL.md for instructions: uv run pytest tests/test_web_ui.py --headed
      - run: uv run pytest --tb=short -q --ignore=tests/test_web_ui.py
